<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event List</title>

<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  margin: 0;
  padding: 15px;
  color: #333;
}

/* Header */
.header-title {
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 20px;
  color: white;
}

/* Card */
.card {
  background: white;
  border-radius: 14px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

/* Top Row */
.top-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Title */
.title {
  font-weight: 600;
  font-size: 16px;
  color: #2c3e50;
}

/* Date badge */
.date {
  display: inline-block;
  margin-top: 8px;
  font-size: 13px;
  background: #eef2ff;
  color: #5a67d8;
  padding: 5px 10px;
  border-radius: 8px;
}

/* Button */
.button {
  background: linear-gradient(135deg, #36d1dc, #5b86e5);
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  transition: 0.2s;
}

.button:hover {
  transform: scale(1.05);
}

/* Details */
.details {
  margin-top: 10px;
  padding: 12px;
  background: #f7f9fc;
  border-radius: 10px;
  display: none;
  font-size: 14px;
  animation: fadeIn 0.3s ease;
}

.details div {
  margin-bottom: 6px;
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>

<div class="header-title">📅 Event List</div>

<div id="events">Loading events...</div>

<script>
fetch("https://script.google.com/macros/s/AKfycbwm3fDolDcWT0DZ0K7o7wKSC3qa7ADKrckzcMdBGei_mK-C8PI6K3Z3uNuzqPW9JI3S/exec")
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.slice(1).forEach((row, index) => {

      html += `
        <div class="card">
          
          <div class="top-row">
            <div class="title">${row[0]}</div>
            <button class="button" onclick="toggleDetails(${index}, this)">View</button>
          </div>

          <div class="date">${row[1]}</div>

          <div id="details-${index}" class="details">
            <div><strong>📍 Location:</strong> ${row[2]}</div>
            <div><strong>📝 Description:</strong> ${row[3]}</div>
          </div>

        </div>
      `;
    });

    document.getElementById("events").innerHTML = html;
  })
  .catch(err => {
    document.getElementById("events").innerHTML = "Failed to load data.";
    console.error(err);
  });

function toggleDetails(index, btn) {
  const el = document.getElementById("details-" + index);

  if (el.style.display === "none" || el.style.display === "") {
    el.style.display = "block";
    btn.innerText = "Hide";
  } else {
    el.style.display = "none";
    btn.innerText = "View";
  }
}
</script>

</body>
</html>
