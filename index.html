<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events</title>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
  padding: 10px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-weight: bold;
}

.date {
  color: gray;
  font-size: 14px;
}

.button {
  background: #007BFF;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
}

.details {
  margin-top: 10px;
  padding-left: 15px;
  border-left: 2px solid #ddd;
  display: none;
}
</style>
</head>

<body>

<h2>Event List</h2>
<div id="events"></div>

<script>
fetch("https://script.google.com/macros/s/AKfycbwm3fDolDcWT0DZ0K7o7wKSC3qa7ADKrckzcMdBGei_mK-C8PI6K3Z3uNuzqPW9JI3S/exec")
  .then(res => res.json())
  .then(data => {
    let html = "";

    data.slice(1).forEach((row, index) => {
      html += `
        <div class="card">
          <div class="header">
            <div class="title">${row[0]}</div>
            <button class="button" onclick="toggleDetails(${index})">View</button>
          </div>

          <div class="date">${row[1]}</div>

          <div id="details-${index}" class="details">
            <div><b>Location:</b> ${row[2]}</div>
            <div><b>Description:</b> ${row[3]}</div>
          </div>
        </div>
      `;
    });

    document.getElementById("events").innerHTML = html;
  });

function toggleDetails(index) {
  const el = document.getElementById("details-" + index);

  if (el.style.display === "none") {
    el.style.display = "block";
  } else {
    el.style.display = "none";
  }
}
</script>

</body>
</html>
